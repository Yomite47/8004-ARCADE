<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8004 Runner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      // Polyfill for Web3 libraries (Ether.js / Thirdweb) needing global/process
      window.global = window;
      window.process = {
        env: { NODE_ENV: 'development' },
        version: ''
      };
    </script>
    <style>
      body {
        font-family: 'Space Mono', monospace;
        background-color: #050505;
        color: #e0e0e0;
        overflow-x: hidden;
      }
      
      /* CRT Scanline Effect */
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%,
          rgba(0, 0, 0, 0.1)
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 50;
      }

      /* Cyber Grid Background */
      .cyber-grid {
        background-size: 40px 40px;
        background-image:
          linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      }

      .cyber-grid-perspective {
        transform: perspective(500px) rotateX(60deg);
        transform-origin: top center;
      }

      /* Glitch Animations */
      .glitch-text {
        position: relative;
      }
      
      .glitch-text::before,
      .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      
      .glitch-text::before {
        left: 2px;
        text-shadow: -1px 0 #ff003c;
        clip: rect(24px, 550px, 90px, 0);
        animation: glitch-anim-2 3s infinite linear alternate-reverse;
      }
      
      .glitch-text::after {
        left: -2px;
        text-shadow: -1px 0 #00ff41;
        clip: rect(85px, 550px, 140px, 0);
        animation: glitch-anim 2.5s infinite linear alternate-reverse;
      }

      @keyframes glitch-anim {
        0% { clip: rect(22px, 9999px, 15px, 0); }
        5% { clip: rect(68px, 9999px, 86px, 0); }
        10% { clip: rect(34px, 9999px, 2px, 0); }
        15% { clip: rect(91px, 9999px, 18px, 0); }
        20% { clip: rect(5px, 9999px, 56px, 0); }
        100% { clip: rect(89px, 9999px, 12px, 0); }
      }

      @keyframes glitch-anim-2 {
        0% { clip: rect(65px, 9999px, 96px, 0); }
        20% { clip: rect(12px, 9999px, 3px, 0); }
        40% { clip: rect(86px, 9999px, 12px, 0); }
        60% { clip: rect(32px, 9999px, 64px, 0); }
        80% { clip: rect(2px, 9999px, 1px, 0); }
        100% { clip: rect(45px, 9999px, 87px, 0); }
      }

      .flicker {
        animation: flicker 0.15s infinite;
      }
      
      @keyframes flicker {
        0% { opacity: 0.9; }
        50% { opacity: 1; }
        100% { opacity: 0.95; }
      }

      /* Utility */
      .neon-glow {
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3);
      }
      
      .text-glow-green {
        text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1",
    "ethers": "https://esm.sh/ethers@5.7.2",
    "@thirdweb-dev/react": "https://esm.sh/@thirdweb-dev/react@3.14.0?deps=ethers@5.7.2,react@18.2.0,react-dom@18.2.0",
    "@thirdweb-dev/sdk": "https://esm.sh/@thirdweb-dev/sdk@3.10.22?deps=ethers@5.7.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <div class="scanline"></div>
  </body>
</html>
